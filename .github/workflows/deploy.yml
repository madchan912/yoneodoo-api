name: Deploy API to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for data deployment
        run: sleep 300

      - name: SSH → git pull → docker build → restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/yoneodoo-api
            git pull origin main

            docker build -t yoneodoo-api .
            docker image prune -af

            docker stop yoneodoo-api || true
            docker rm   yoneodoo-api || true

            docker run -d \
              --name yoneodoo-api \
              -p 8080:8080 \
              --env-file /home/ubuntu/.env.prod \
              --restart unless-stopped \
              yoneodoo-api
