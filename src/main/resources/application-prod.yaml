spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false # 🚀 운영 서버에서는 로그가 너무 길어지면 안 되니 SQL 출력은 끕니다.
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO

# Render 등: ADMIN_SECRET 환경변수로 설정. 미설정 시 빈 값 → 어드민 경로는 503 (기동은 계속됨)
yoneodoo:
  admin:
    secret: ${ADMIN_SECRET:}

# 🤖 Gemini API — 운영에서는 GEMINI_API_KEY 환경변수로만 주입. 미설정 시 AI 추천 API 는 503 응답.
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.5-flash
  connect-timeout-ms: 30000
  read-timeout-ms: 180000